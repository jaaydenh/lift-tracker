name: Mobile CI

on:
  push:
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "packages/platform-mobile/**"
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "packages/platform-mobile/**"
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Mobile typecheck
        run: bun run --filter @lift-tracker/mobile tsc

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Unit tests
        run: bun run test

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Web lint
        run: bun run --filter @lift-tracker/web lint

  # Manual-only preview build to avoid automatic EAS runs on push/PR.
  eas-build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_ACCESS_TOKEN }}
      - name: EAS iOS preview build
        working-directory: apps/mobile
        run: eas build --platform ios --profile preview --non-interactive
